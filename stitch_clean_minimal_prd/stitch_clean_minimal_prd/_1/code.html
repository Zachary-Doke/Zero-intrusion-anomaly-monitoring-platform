<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 异常分析平台</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;family=Noto+Sans+SC:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#525c87",
                        "inverse-primary": "#b8c4ff",
                        "error": "#ba1a1a",
                        "surface-container": "#eceef0",
                        "surface-bright": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "inverse-surface": "#2d3133",
                        "inverse-on-surface": "#eff1f3",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#0e1840",
                        "tertiary-fixed-dim": "#ffb3b6",
                        "on-tertiary-fixed-variant": "#920028",
                        "on-tertiary-container": "#ffa2a7",
                        "outline-variant": "#c4c5d5",
                        "background": "#f7f9fb",
                        "on-secondary-fixed-variant": "#3b446e",
                        "primary": "#00288e",
                        "secondary-fixed-dim": "#bbc4f6",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e6e8ea",
                        "on-primary-fixed-variant": "#173bab",
                        "outline": "#757684",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#4c5680",
                        "on-primary-fixed": "#001453",
                        "primary-container": "#1e40af",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-container": "#c3ccfe",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed": "#40000c",
                        "surface-tint": "#3755c3",
                        "tertiary-container": "#9a002b",
                        "on-surface-variant": "#444653",
                        "surface-variant": "#e0e3e5",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "primary-fixed-dim": "#b8c4ff",
                        "on-primary-container": "#a8b8ff",
                        "secondary-fixed": "#dde1ff",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#6f001c",
                        "tertiary-fixed": "#ffdada",
                        "surface-container-low": "#f2f4f6",
                        "on-background": "#191c1e",
                        "primary-fixed": "#dde1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Outfit", "Noto Sans SC", "sans-serif"],
                        "body": ["Inter", "Noto Sans SC", "sans-serif"],
                        "label": ["Inter", "Noto Sans SC", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #f7f9fb 0%, #dde1ff 100%);
            background-attachment: fixed;
        }
        .login-card {
            box-shadow: 0 12px 32px -4px rgba(30, 64, 175, 0.06);
            border-radius: 6px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-on-surface">
<!-- TopAppBar suppressed for transactional focus per shell visibility rules -->
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Abstract background element for "The Digital Curator" aesthetic -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-3xl"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Logo Section -->
<div class="flex items-center justify-center mb-10 space-x-3">
<div class="bg-primary-container p-2 rounded-[6px] flex items-center justify-center">
<span class="material-symbols-outlined text-white text-2xl" data-icon="analytics" style="font-variation-settings: 'FILL' 1;">analytics</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-primary font-headline">异常分析平台</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest login-card p-10 border border-outline-variant/10">
<div class="mb-8">
<h2 class="text-2xl font-bold text-on-surface font-headline tracking-tight mb-2">欢迎登录 异常分析平台</h2>
<p class="text-on-surface-variant text-sm font-body">请输入您的凭据以访问控制面板</p>
</div>
<form class="space-y-6">
<!-- Account Input -->
<div>
<label class="block text-[11px] font-bold tracking-widest text-on-surface-variant mb-2 uppercase font-label">账号/邮箱</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="person">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-surface-container-high border-none focus:ring-1 focus:ring-primary/40 rounded-[6px] text-on-surface placeholder:text-outline transition-all duration-300 font-body text-sm" placeholder="输入账号或电子邮件" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-[11px] font-bold tracking-widest text-on-surface-variant uppercase font-label">密码</label>
<a class="text-[11px] font-bold text-primary hover:text-primary-container transition-colors duration-200" href="#">忘记密码?</a>
</div>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-surface-container-high border-none focus:ring-1 focus:ring-primary/40 rounded-[6px] text-on-surface placeholder:text-outline transition-all duration-300 font-body text-sm" placeholder="输入您的密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline-variant rounded-[2px] focus:ring-primary/20 bg-surface-container-high" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-on-surface-variant font-body" for="remember">保持登录状态</label>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary-container text-white font-bold rounded-[6px] hover:bg-primary transition-all duration-300 active:scale-[0.98] shadow-lg shadow-primary/10 font-headline text-base" type="submit">
                        登录
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center"><div class="w-full border-t border-outline-variant/20"></div></div>
<div class="relative flex justify-center text-xs uppercase"><span class="bg-surface-container-lowest px-4 text-outline font-label tracking-widest">安全验证</span></div>
</div>
<!-- Footer Hint -->
<p class="text-center text-xs text-on-surface-variant/60 font-body">
                    登录即代表您同意我们的服务条款与隐私政策
                </p>
</div>
</div>
</main>
<!-- Footer Component from JSON Integration -->
</body></html>
